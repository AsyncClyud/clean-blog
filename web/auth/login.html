<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>
	<meta name="description" content="Login Page">
	<link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
	<link rel="shortcut icon" href="/icons/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
	<meta name="apple-mobile-web-app-title" content="Clean Blog" />
	<link rel="manifest" href="/icons/site.webmanifest" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
    @theme {
        --color-clifford: #da373d;
    }
    </style>
    <script src="/auth/scripts/login.js"></script>
    <script type="module" src="/auth/scripts/is_auth/is_auth.js"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-[100vh] bg-[#212830] grid grid-rows-[auto_1fr_auto] m-[0]">
    <header class="h-[13vh] w-auto bg-[#151b23] text-[white] font-[JetBrains_Mono] row-[1] outline-[2px] outline-solid outline-[#333c46]" id="header">
        <h1 class="text-[5vh] text-[#d1d7e0] font-[JetBrains_Mono] m-[5px]">Clean Blog</h1>
        <a class="bg-[#2a323c] text-[gainsboro] rounded-[3px] p-[5px] m-[5px]" href="/">Main</a>
        <a class="bg-[#2a323c] text-[gainsboro] rounded-[3px] p-[5px] m-[5px]" href="/auth/register">Registration</a>
    </header>
    <main class="w-[70vw] grid grid-rows-[auto_auto_auto_auto] text-[#d1d7e0] text-center font-[JetBrains_Mono] m-[10px] mr-auto ml-auto p-6 content-center justify-center justify-items-center" id="main">
        <div class="h-fit w-[45vw] bg-[#212121] outline-[2px] outline-solid outline-[#333c46] rounded-[5px]" id="login">
            <h3 class="text-[3vh] m-[10px]">Username</h3>
            <input class="w-[20vw] bg-[white] text-[black] rounded-[2px]" type="text" placeholder="Username..." id="username"> <br>
            <h3 class="text-[3vh] m-[10px]">Password</h3>
            <input class="w-[20vw] bg-[white] text-[black] rounded-[2px]" type="password" placeholder="Password..." id="password"> <br>
            <button class="w-fit bg-[white] text-[black] text-[JetBrains_Mono] rounded-[3px] m-[10px] p-[5px]" type="button" onclick="SendLoginRequest()">login</button>
            <p id="status"></p>
            <div class="cf-turnstile" id="turnstile-widget" data-sitekey="0x4AAAAAAD2voHPreG9maJ8u" data-theme="dark" data-size="compact"></div>
        </div>
    </main>
    <footer class="h-[8vh] w-auto row-[3] bg-[#212830] text-center text-[gainsboro] font-[JetBrains_Mono] outline-[3px] outline-solid outline-[#151b23]" id="footer">
        <a class="m-[5px] text-[gainsboro]" href="https://github.com/AsyncClyud/clean-blog" target="_blank">Github</a>
        <a class="m-[5px] text-[gainsboro]" href="/privacy">Privacy Policy</a>
        <a class="m-[5px] text-[gainsboro]" href="/terms">Terms of Service</a>
    </footer>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
