<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Auth</title>
	<meta name="description" content="Register Page">
	<link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
	<link rel="shortcut icon" href="/icons/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
	<meta name="apple-mobile-web-app-title" content="Clean Blog" />
	<link rel="manifest" href="/icons/site.webmanifest" />
	<link rel="stylesheet" href="styles/styles.css">
	<script src="scripts/register.js"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header" id="header">
            <h1>Clean Blog</h1>
            <a href="/">Main</a>
            <a href="/auth/login">Login</a>
        </div>
    </header>
    <main class="main" id="main">
        <div class="auth" id="register">
            <h3>Username</h3>
            <input type="text" id="username"> <br>
            <h3>Password</h3>
            <input type="password" id="password"> <br>
            <button type="button" onclick="SendRegisterRequest()">register</button>
            <p id="status"></p>
        </div>
    </main>
    <footer class="footer" id="footer">
        <a href="https://github.com/AsyncClyud/clean-blog" target="_blank">Github</a>
        <a href="/privacy">Privacy Policy</a>
        <a href="/terms">Terms of service</a>
    </footer>
</body>
</html>
