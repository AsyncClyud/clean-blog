<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profile</title>
	<meta name="description" content="User profile page">
	<link rel="stylesheet" href="styles/styles.css">
	<link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
	<link rel="shortcut icon" href="/icons/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
	<meta name="apple-mobile-web-app-title" content="Clean Blog" />
	<link rel="manifest" href="/icons/site.webmanifest" />
	<script src="scripts/settings.js"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header" id="header">
        <h1>Clean Blog</h1>
        <a href="/">Main</a>
        <a href="/profile">Profile</a>
    </header>
    <main class="main" id="main">
        <div class="settings" id="actions">
            <h2>Account info</h2>
            <h3>Username</h3>
            <p id="username"></p>
            <input type="text" id="input_username">
            <p id="message_username"></p>
            <button type="button" onclick="SendUpdateUsernameRequest()">Change Username</button>
            <h3>Bio</h3>
            <p id="bio"></p>
            <textarea id="input_bio" rows="5" cols="30"></textarea> <br>
            <button type="button" onclick="SendUpdateBioRequest()">Change bio</button>
            <p id="message_bio"></p>
            <h3>Password</h3>
            <p>Enter old password</p>
            <input type="password" id="input_old_password">
            <p>Enter new password</p>
            <input type="password" id="input_new_password"> <br>
            <button type="button" onclick="SendUpdatePasswordRequest()">Change password</button>
            <p id="message_password"></p>
        </div>
    </main>
    <footer class="footer" id="footer">
        <a href="https://github.com/AsyncClyud/clean-blog" target="_blank">Github</a>
        <a href="/privacy">Privacy Policy</a>
        <a href="/terms">Terms of service</a>
    </footer>

    <script>
      FetchUserInfo()
    </script>

</body>
</html>
